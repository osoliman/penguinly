<!DOCTYPE html>
<html lang="en" data-theme="sunset">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create account — Penguinly</title>
  <script>(function(){var t=localStorage.getItem('theme')||'sunset';document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="flash-stack">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash flash-{{ category if category != 'message' else 'info' }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}
</div>

<div class="auth-page">
  <div class="auth-card" style="max-width:460px;">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <!-- SVG Penguin -->
        <svg width="48" height="52" viewBox="0 0 100 110" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="50" cy="68" rx="30" ry="34" fill="var(--accent)"/>
          <ellipse cx="50" cy="74" rx="18" ry="21" fill="white" opacity=".9"/>
          <circle cx="50" cy="30" r="22" fill="var(--accent)"/>
          <circle cx="42" cy="26" r="4" fill="white"/>
          <circle cx="58" cy="26" r="4" fill="white"/>
          <circle cx="42.5" cy="27" r="2" fill="#1a1a2e"/>
          <circle cx="58.5" cy="27" r="2" fill="#1a1a2e"/>
          <ellipse cx="50" cy="37" rx="6" ry="4" fill="#F59E0B"/>
          <ellipse cx="38" cy="100" rx="11" ry="6" fill="#F59E0B"/>
          <ellipse cx="62" cy="100" rx="11" ry="6" fill="#F59E0B"/>
        </svg>
      </div>
      <div class="auth-title">Join Penguinly</div>
      <div class="auth-subtitle">Small circles. Deep connections.</div>
    </div>

    <div class="card">
      <form method="POST" action="{{ url_for('register') }}" class="auth-form">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div class="form-group">
            <label class="form-label" for="username">Username <span style="color:var(--red)">*</span></label>
            <input
              class="form-input"
              type="text"
              id="username"
              name="username"
              placeholder="yourhandle"
              autocomplete="username"
              required
              autofocus
              pattern="[a-zA-Z0-9._]{3,50}"
              title="Letters, numbers, _ and . only"
            >
            <span class="form-hint">Letters, numbers, _ and .</span>
          </div>

          <div class="form-group">
            <label class="form-label" for="display_name">Display name</label>
            <input
              class="form-input"
              type="text"
              id="display_name"
              name="display_name"
              placeholder="Your Name"
              autocomplete="name"
              maxlength="100"
            >
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email <span style="color:var(--red)">*</span></label>
          <input
            class="form-input"
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          >
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div class="form-group">
            <label class="form-label" for="password">Password <span style="color:var(--red)">*</span></label>
            <input
              class="form-input"
              type="password"
              id="password"
              name="password"
              placeholder="Min 6 characters"
              autocomplete="new-password"
              required
              minlength="6"
            >
          </div>

          <div class="form-group">
            <label class="form-label" for="confirm_password">Confirm password <span style="color:var(--red)">*</span></label>
            <input
              class="form-input"
              type="password"
              id="confirm_password"
              name="confirm_password"
              placeholder="Repeat password"
              autocomplete="new-password"
              required
            >
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:4px;">
          Create my account
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </form>

      <div class="auth-footer">
        Already have an account?
        <a href="{{ url_for('login') }}" class="auth-link">Sign in</a>
      </div>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
